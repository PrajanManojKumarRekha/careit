services:
  - type: web
    name: careit-api
    runtime: python
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r src/api/requirements.txt
    startCommand: python -m uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOW_DOTENV
        value: "false"
      - key: ALLOW_ONEDRIVE_DOTENV
        value: "false"
      - key: ALLOW_DEMO_MODE
        value: "true"
      - key: JWT_COOKIE_SECURE
        value: "true"
      - key: JWT_COOKIE_SAMESITE
        value: none
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CLERK_JWT_AUDIENCE
        sync: false
      - key: CLERK_API_URL
        value: https://api.clerk.com
      - key: CLERK_TOKEN_TEMPLATE
        value: careit-api
      - key: AUTH_EMAIL_DELIVERY_MODE
        value: smtp
      - key: AUTH_EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: ELEVENLABS_API_KEY
        sync: false
